<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Booking System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Food Booking System</h1>

    <input type="text" id="customer" placeholder="Customer Name">
    <input type="text" id="food" placeholder="Food Name">
    <input type="number" id="quantity" placeholder="Quantity">

    <button id="addBtn">Add Booking</button>

    <div id="list"></div>

</div>


<dialog id="editDialog">
    <h2>Edit Booking</h2>

    <input type="text" id="editCustomer" placeholder="Customer Name">

    <select id="editFood">
        <option>Burger</option>
        <option>Pizza</option>
        <option>Spaghetti</option>
        <option>Fried Chicken</option>
        <option>Hotdog</option>
        <option>Fries</option>
        <option>Sandwich</option>
        <option>Rice Meal</option>
    </select>

    <input type="number" id="editQuantity" placeholder="Quantity">

    <div class="dialog-buttons">
        <button id="updateBtn">Update</button>
        <button id="cancelBtn" type="button">Cancel</button>
    </div>
</dialog>
<script src="script.js"></script>

</body>
</html>
